services:
    cf_panel:
        restart: unless-stopped
        build:
            context: ./
            dockerfile: Dockerfile
            args:
                USER_ID: ${UID:-1000}
                GROUP_ID: ${GID:-1000}
        ports:
            - '804:8000'
            - '5173:5173'
        volumes:
            - './:/app'
        command: sh -c "php artisan serve --host=0.0.0.0 --port=8000"
        stdin_open: true
        tty: true
        environment:
            - HOME=/tmp
        depends_on:
            cf_db:
                condition: service_healthy
        networks:
            - cf

    cf_db:
        restart: unless-stopped
        image: 'mysql:8.0'
        container_name: cf_db
        ports:
            - '3317:3306'
        environment:
            MYSQL_DATABASE: cf
            MYSQL_ROOT_PASSWORD: root
            MYSQL_PASSWORD: root
        volumes:
            - './storage/dbdata:/var/lib/mysql'
        networks:
            - cf
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
            interval: 5s
            timeout: 3s
            retries: 20

    cf_mail:
        image: 'axllent/mailpit:latest'
        container_name: cf_mail
        restart: unless-stopped
        ports:
            - '1025:1025'
            - '8025:8025'
        networks:
            - cf

networks:
    cf:
        driver: bridge
